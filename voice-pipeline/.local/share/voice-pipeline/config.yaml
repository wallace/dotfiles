# Stage-2 (local LLM) settings and shared options.

# Ollama model tag. M4 Max / 64 GB runs either comfortably:
#   qwen3:14b  -> fast (~35-50 tok/s), great for summary + todo extraction (default)
#   qwen3:32b  -> higher quality, still well within 64 GB; swap in if you want it
model: qwen3:14b

ollama_url: http://localhost:11434
seed: 42          # fixed seed + temperature 0 => reproducible output on this host
num_ctx: 32768    # long enough for ~1 hr transcripts; fits easily in 64 GB
timeout: 900      # seconds

# Stage-1 noise removal. Conservative on purpose: only Whisper hallucinations and
# bracketed sound cues. Real words (yeah/okay/bye) are kept. Each entry is a regex
# matched against a whole segment (case-insensitive).
noise_patterns:
  - "Thank you\\.?"
  - "Thanks for watching[.!]?"
  - "This is the end of the video\\.?"
  - "\\*?\\s*sad music\\s*\\*?"
  - "\\*?\\s*Sigh\\s*\\*?"
  - "\\*?\\s*Music\\s*\\*?"
  - "\\[.*?\\]"
